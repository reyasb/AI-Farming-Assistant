<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Smart Farming</title>
    <link rel="stylesheet" href="sty.css">
    <link rel="icon" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="row align-items-center justify-content-center mt-5">
    <div class="col-lg-8">
        <div class="card shadow-lg border-0 p-3 login-card" style="background-color: #A9BA9D;">
            <div class="text-center mb-4">
                <img src="logo.png" width="70">
                <h3 class="mt-3 text-success fw-bold">Farm Information Form</h3>
                <p class="text-muted">Enter your farm details to get smart recommendations. </p>
            </div>
            <form id="formid">
                <h5 class="text-success mb-3">Farmer Details</h5>
                <div class="mb-3">
                    <label class="form-label">Farmer Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">District</label>
                    <select id="district" class="form-select">
                        <option selected>Select District</option>
                        <option>Thiruvananthapuram</option>
                        <option>Kollam</option>
                        <option>Pathanamthitta</option>
                        <option>Alappuzha</option>
                        <option>Kottayam</option>
                        <option>Idukki</option>
                        <option>Ernakulam</option>
                        <option>Thrissur</option>
                        <option>Palakkad</option>
                        <option>Malappuram</option>
                        <option>Kozhikode</option>
                        <option>Wayanad</option>
                        <option>Kannur</option>
                        <option>Kasaragod</option>
                    </select>
                </div>
                <h5 class="text-success mb-3">Farm Details</h5>
                <div class="mb-3">
                    <label class="form-label">Farm Location</label>
                    <input type="text" class="form-control" placeholder="Enter Farm Location">
                </div>
                <div class="mb-3">
                    <label class="form-label">Farm Size (Acres/Cents)</label>
                    <input type="text" class="form-control" placeholder="Example : 2 Acres">
                </div>
                <div class="mb-3">
                    <label class="form-label">Soil Type</label>
                    <select id="soil" class="form-select">
                        <option selected>Select Soil Type</option>
                        <option>Clay</option>
                        <option>Sandy</option>
                        <option>Loamy</option>
                        <option>Laterite</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Water Source</label>
                    <select class="form-select">
                        <option selected>Select Water Source</option>
                        <option>Rain-fed</option>
                        <option>Borewell</option>
                        <option>Canal</option>
                        <option>River</option>
                        <option>Pond</option>
                    </select>
                </div>
                <h5 class="text-success mb-3">Crop Details</h5>
                <div class="mb-3">
                    <label class="form-label">Crop Name</label>
                    <select id="crop" class="form-select">
                        <option selected>Select Crop</option>
                        <option>Rice</option>
                        <option>Coconut</option>
                        <option>Banana</option>
                        <option>Rubber</option>
                        <option>Pepper</option>
                        <option>Coffee</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Growth Stage</label>
                    <select class="form-select">
                        <option selected>Select Stage</option>
                        <option>Seed</option>
                        <option>Vegetative</option>
                        <option>Flowering</option>
                        <option>Fruiting</option>
                        <option>Harvesting</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Season</label>
                    <select id="season" class="form-select">
                        <option selected>Select Season</option>
                        <option>Summer</option>
                        <option>Monsoon</option>
                        <option>Winter</option>
                    </select>
                </div>
                <h5 class="text-success mb-3">Environmental Information</h5>
                <div class="mb-3">
                    <label class="form-label">Temperature (°C)</label>
                    <input id="temperature" type="number" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Humidity (%)</label>
                    <input id="humidity" type="number" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Rainfall (mm)</label>
                    <input type="number" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label">Soil Moisture</label>
                    <select class="form-select">
                        <option selected>Select</option>
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>
                </div>
                <h5 class="text-success mb-3">Soil Nutrients</h5>
                <div class="mb-3">
                    <label class="form-label">Nitrogen (N)</label>
                    <input id="nitrogen" type="number" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phosphorus (P)</label>
                    <input id="phosphorus" type="number" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Potassium (K)</label>
                    <input id="potassium" type="number" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label">Soil pH</label>
                    <input id="ph" type="number" class="form-control" placeholder="Eg: 6.5">
                </div><h5 class="text-success mb-3">Plant Health</h5>
                <div class="mb-3">
                    <label class="form-label">Is your crop showing symptoms?</label>
                    <select class="form-select">
                        <option selected>Select</option>
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label">Upload Plant Leaf Image</label>
                    <input type="file" class="control">
                </div>
                <button type="submit" class="btn btn-success w-100">🌱 Get AI Recommendation</button>
                <div id="result" class="mt-4 p-3 border rounded bg-light" style="display: none;">
                    <h4 class="text-success">🌾 AI Recommendation</h4>
                    <p id="resultText"></p>
                </div>
            </form>
        </div>
    </div>
</div>
    <script src="jasc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
